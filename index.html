<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl Pro - Gestión Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .login-gradient { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }
        .view { transition: opacity 0.3s ease; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900">

    <!-- PANTALLA DE LOGIN -->
    <div id="view-login" class="fixed inset-0 z-[1000] login-gradient flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-8">
            <div class="text-center">
                <div class="inline-flex p-4 bg-red-50 rounded-2xl mb-4">
                    <i class="fas fa-shield-alt text-red-900 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-black text-gray-800">EduControl</h1>
                <p class="text-gray-400 font-medium">Control de Acceso Escolar</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Usuario</label>
                    <input type="text" id="login-user" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl px-4 py-3 outline-none focus:border-red-800 transition font-bold" placeholder="admin">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Contraseña</label>
                    <input type="password" id="login-pass" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl px-4 py-3 outline-none focus:border-red-800 transition font-bold" placeholder="••••••••">
                </div>
                <button onclick="attemptLogin()" class="w-full bg-red-900 text-white py-4 rounded-2xl font-black hover:bg-red-800 shadow-lg transition">
                    Entrar al Sistema
                </button>
            </div>
            <p id="login-error" class="text-center text-red-600 font-bold text-xs hidden italic">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="main-content" class="hidden">
        <nav class="bg-red-900 text-white shadow-2xl sticky top-0 z-50">
            <div class="container mx-auto px-6 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-user-check text-xl"></i>
                    <h1 class="text-lg font-extrabold">EduControl</h1>
                </div>
                <div class="hidden md:flex gap-2">
                    <button onclick="showView('attendance')" class="px-4 py-2 rounded-lg hover:bg-red-800 text-sm font-bold">Asistencia</button>
                    <button onclick="showView('admin')" class="px-4 py-2 rounded-lg hover:bg-red-800 text-sm font-bold">Configuración</button>
                    <button onclick="showView('history')" class="px-4 py-2 rounded-lg hover:bg-red-800 text-sm font-bold">Historial</button>
                    <button onclick="logout()" class="px-4 py-2 rounded-lg bg-red-950 text-sm font-bold">Salir</button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-6 max-w-5xl">
            <!-- VISTA: ASISTENCIA -->
            <div id="view-attendance" class="view space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-black">Pase de Lista</h2>
                        <p id="display-date" class="text-gray-500 font-medium"></p>
                    </div>
                    <select id="select-attendance-group" onchange="renderAttendanceList()" class="bg-gray-50 border-2 p-3 rounded-xl font-bold outline-none focus:border-red-800"></select>
                    <button onclick="saveAttendance()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-black">Guardar Lista</button>
                </div>
                <div id="attendance-grid" class="space-y-2"></div>
            </div>

            <!-- VISTA: ADMIN -->
            <div id="view-admin" class="view hidden space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 h-fit">
                        <h3 class="text-xl font-black mb-4 tracking-tight text-red-900 italic underline">Nuevo Grupo</h3>
                        <div class="space-y-3">
                            <input type="text" id="adm-grade" placeholder="Grado" class="w-full bg-gray-50 border p-3 rounded-xl font-bold">
                            <input type="text" id="adm-group" placeholder="Grupo" class="w-full bg-gray-50 border p-3 rounded-xl font-bold uppercase">
                            <input type="text" id="adm-teacher" placeholder="Maestro" class="w-full bg-gray-50 border p-3 rounded-xl font-bold">
                            <input type="text" id="adm-subject" placeholder="Materia" class="w-full bg-gray-50 border p-3 rounded-xl font-bold">
                            <button onclick="createNewClassroom()" class="w-full bg-red-900 text-white py-3 rounded-xl font-black">Crear</button>
                        </div>
                        <div id="classroom-list" class="mt-6 space-y-2"></div>
                    </section>

                    <section id="panel-details" class="lg:col-span-2 hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <h3 class="text-xl font-black mb-4">Gestionar Alumnos</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="st-name" placeholder="Nombre completo del alumno" class="flex-1 bg-gray-50 border p-3 rounded-xl font-bold">
                            <button onclick="addStudent()" class="bg-red-900 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                        </div>
                        <ul id="student-list" class="divide-y font-bold"></ul>
                    </section>
                </div>
            </div>

            <!-- VISTA: HISTORIAL -->
            <div id="view-history" class="view hidden space-y-4">
                <h2 class="text-2xl font-black">Registros de Asistencia</h2>
                <div id="history-list" class="grid gap-3"></div>
            </div>
        </main>
    </div>

    <!-- NOTIFICACIÓN TOAST -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[2000] opacity-0 transition-all duration-300 bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl"></div>

    <script>
        // DATOS LOCALES (Fallbacks si no hay Firebase)
        let classrooms = JSON.parse(localStorage.getItem('edu_classrooms')) || [];
        let historyRecords = JSON.parse(localStorage.getItem('edu_history')) || [];
        let selectedId = null;
        let tempAttendance = {};

        // --- AUTENTICACIÓN LOCAL ---
        window.attemptLogin = () => {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const errorLabel = document.getElementById('login-error');

            if (u === "admin" && p === "1234") {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initApp();
            } else {
                errorLabel.classList.remove('hidden');
                setTimeout(() => errorLabel.classList.add('hidden'), 3000);
            }
        };

        window.logout = () => { location.reload(); };

        // --- GESTIÓN DE VISTAS ---
        window.showView = (v) => {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
        };

        // --- LÓGICA DE NEGOCIO ---
        function initApp() {
            renderAll();
            document.getElementById('display-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        window.createNewClassroom = () => {
            const grade = document.getElementById('adm-grade').value.trim();
            const group = document.getElementById('adm-group').value.trim();
            const teacher = document.getElementById('adm-teacher').value.trim();
            const subject = document.getElementById('adm-subject').value.trim();

            if(!grade || !group) return showToast("Faltan datos");

            const newClass = {
                id: Date.now().toString(),
                fullName: `${grade} ${group.toUpperCase()}`,
                teacher,
                subject,
                students: []
            };

            classrooms.push(newClass);
            saveData();
            renderAll();
            showToast("Grupo creado");
        };

        window.selectClassroom = (id) => {
            selectedId = id;
            document.getElementById('panel-details').classList.remove('hidden');
            renderAll();
        };

        window.addStudent = () => {
            const name = document.getElementById('st-name').value.trim();
            if(!name || !selectedId) return;
            
            const c = classrooms.find(x => x.id === selectedId);
            c.students.push({ id: Date.now().toString(), name: name.toUpperCase() });
            c.students.sort((a,b) => a.name.localeCompare(b.name));
            
            document.getElementById('st-name').value = "";
            saveData();
            renderAll();
        };

        window.saveAttendance = () => {
            const gid = document.getElementById('select-attendance-group').value;
            const c = classrooms.find(x => x.id === gid);
            if(!c) return;

            const record = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                group: c.fullName,
                subject: c.subject,
                present: Object.values(tempAttendance).filter(v => v === 'P').length,
                total: c.students.length
            };

            historyRecords.unshift(record);
            tempAttendance = {};
            saveData();
            renderAll();
            showView('history');
            showToast("Lista guardada localmente");
        };

        window.mark = (sid, status) => {
            tempAttendance[sid] = status;
            renderAttendanceList();
        };

        // --- RENDERIZADO ---
        function renderAll() {
            // Grupos en admin
            document.getElementById('classroom-list').innerHTML = classrooms.map(c => `
                <div onclick="selectClassroom('${c.id}')" class="p-3 rounded-xl cursor-pointer border-2 font-bold ${selectedId === c.id ? 'border-red-800 bg-red-50' : 'bg-white border-transparent'}">
                    ${c.fullName} <span class="text-[10px] text-gray-400 block">${c.subject}</span>
                </div>
            `).join('');

            // Alumnos en admin
            if(selectedId) {
                const c = classrooms.find(x => x.id === selectedId);
                document.getElementById('student-list').innerHTML = c.students.map(s => `
                    <li class="py-2 flex justify-between uppercase text-sm">${s.name}</li>
                `).join('');
            }

            // Select de asistencia
            document.getElementById('select-attendance-group').innerHTML = classrooms.map(c => `<option value="${c.id}">${c.fullName}</option>`).join('') || '<option>Crea un grupo</option>';

            // Lista de asistencia
            renderAttendanceList();

            // Historial
            document.getElementById('history-list').innerHTML = historyRecords.map(h => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-red-900 flex justify-between items-center">
                    <div><b class="text-red-900">${h.group}</b><p class="text-xs text-gray-500">${h.date} - ${h.subject}</p></div>
                    <div class="font-black text-xl">${h.present}/${h.total}</div>
                </div>
            `).join('');
        }

        window.renderAttendanceList = () => {
            const gid = document.getElementById('select-attendance-group').value;
            const c = classrooms.find(x => x.id === gid);
            const grid = document.getElementById('attendance-grid');
            if(!c) return grid.innerHTML = "";

            grid.innerHTML = c.students.map(s => {
                const status = tempAttendance[s.id] || 'P';
                return `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center border shadow-sm">
                        <span class="font-bold text-gray-700">${s.name}</span>
                        <div class="flex gap-2">
                            <button onclick="mark('${s.id}', 'P')" class="w-10 h-10 rounded-lg font-black ${status === 'P' ? 'bg-green-600 text-white' : 'bg-gray-100'}">P</button>
                            <button onclick="mark('${s.id}', 'A')" class="w-10 h-10 rounded-lg font-black ${status === 'A' ? 'bg-red-600 text-white' : 'bg-gray-100'}">F</button>
                        </div>
                    </div>
                `;
            }).join('');
        };

        function saveData() {
            localStorage.setItem('edu_classrooms', JSON.stringify(classrooms));
            localStorage.setItem('edu_history', JSON.stringify(historyRecords));
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
